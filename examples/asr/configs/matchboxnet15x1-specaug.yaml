model: "QuartzNet"
sample_rate: 16000
repeat: &rep 1
dropout: &drop 0.0

AudioToTextDataLayer:
    max_duration: 16.7
    trim_silence: true

    train:
        shuffle: true

    eval:
        shuffle: false
        max_duration: null

AudioToMelSpectrogramPreprocessor:
    window_size: 0.02
    window_stride: 0.01
    window: "hann"
    normalize: "per_feature"
    n_fft: 512
    features: 64
    dither: 0.00001
    pad_to: 16
    stft_conv: true

SpectrogramAugmentation:
    freq_masks: 2
    time_masks: 2
    freq_width: 120
    time_width: 50
    rect_masks: 5
    rect_time: 120
    rect_freq: 50

JasperEncoder:
    activation: "relu"
    conv_mask: true

    jasper:
        - filters: 256
          repeat: 1
          kernel: [11]
          stride: [1]
          dilation: [1]
          dropout: 0.0
          residual: false
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [13]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [13]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [15]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [15]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [17]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [17]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [19]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [19]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [21]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [21]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [23]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [23]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [25]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [25]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 64
          repeat: *rep
          kernel: [27]
          stride: [1]
          dilation: [1]
          dropout: *drop
          residual: true
          separable: true

        - filters: 128
          repeat: 1
          kernel: [29]
          stride: [1]
          dilation: [2]
          dropout: 0.0
          residual: false
          separable: true

        - filters: 1024
          repeat: 1
          kernel: [1]
          stride: [1]
          dilation: [1]
          dropout: 0.0
          residual: false
          se: false

labels: [" ", "a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m",
         "n", "o", "p", "q", "r", "s", "t", "u", "v", "w", "x", "y", "z", "'"]
